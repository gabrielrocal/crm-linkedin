  // ── Parse CSV (same logic as crm.html) ──────────────────────────
  function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(Boolean);
    if (!lines.length) return [];
    const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
    return lines.slice(1).map(line => {
      const vals = []; let cur='', inQ=false;
      for(let i=0;i<line.length;i++){
        if(line[i]==='"'){ inQ=!inQ; }
        else if(line[i]===','&&!inQ){ vals.push(cur); cur=''; }
        else { cur+=line[i]; }
      }
      vals.push(cur);
      const row = {};
      headers.forEach((h,i) => row[h] = (vals[i]||'').trim());
      return row;
    }).filter(row => Object.values(row).some(v=>v));
  }

  function csvRowToContact(row) {
    const g = (...keys) => { for(const k of keys){ const f=Object.keys(row).find(rk=>rk.toLowerCase().includes(k.toLowerCase())); if(f&&row[f]) return row[f]; } return ''; };
    // Fixed bool: handles dates as truthy, handles TRUE/FALSE, empty as false
    const bool = v => { if(!v||v==='-'||v==='–') return false; const s=String(v).toLowerCase().trim(); return s!=='false'&&s!=='n'&&s!=='no'&&s!=='0'; };
    const clean = v => (!v||v.trim()==='-'||v.trim()==='–') ? '' : v.trim();
    return {
      source: g('source'), type: g('type'), name: g('name','first'), industry: g('industry'),
      linkedin_url: clean(g('social','linkedin')), website: clean(g('website')),
      email_or_phone: clean(g('email','phone')), first_contact_date: g('first contact','date'),
      bump1: bool(g('gentle','bump1','1 ')), bump2: bool(g('value','nudge','bump2')),
      bump3: bool(g('last shot','bump3','4-5')), response: bool(g('response')),
      loom_sent: bool(g('loom')), sales_call: bool(g('sales call','call')),
      notes: g('notes','message'), answer: g('answer'),
      revenue: parseFloat(g('revenue'))||0,
    };
  }

  // ── Run import ────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const existing = JSON.parse(localStorage.getItem('crm_contacts')||'[]');
    if (existing.length > 0) {
      document.getElementById('icon').textContent = '✅';
      document.getElementById('title').textContent = 'Already imported!';
      document.getElementById('msg').textContent = `You already have ${existing.length} contacts. Redirecting to CRM...`;
      document.getElementById('progress').style.width = '100%';
      setTimeout(() => window.location.href = 'crm.html', 2000);
      return;
    }

    const rows = parseCSV(CSV);
    const contacts = [];
    let i = 0;

    function processNext() {
      if (i >= rows.length) {
        // Done - save and redirect
        localStorage.setItem('crm_contacts', JSON.stringify(contacts));
        document.getElementById('icon').textContent = '✅';
        document.getElementById('title').textContent = `Imported ${contacts.length} contacts!`;
        document.getElementById('msg').textContent = 'Redirecting to your CRM...';
        document.getElementById('progress').style.width = '100%';
        document.getElementById('btn').classList.remove('hidden');
        setTimeout(() => window.location.href = 'crm.html', 2000);
        return;
      }

      const c = csvRowToContact(rows[i]);
      if (c.name.trim()) {
        contacts.push({
          ...c,
          id: Date.now() + contacts.length,
          linkedin_photo: '', linkedin_headline: '', linkedin_company: '',
          linkedin_location: '', website_title: '', website_description: '',
          enriched_at: null,
          created_at: new Date().toISOString(),
          updated_at: new Date().toISOString(),
        });
      }

      i++;
      const pct = Math.round((i / rows.length) * 100);
      document.getElementById('progress').style.width = pct + '%';
      document.getElementById('msg').textContent = `Processing ${i} of ${rows.length}...`;

      setTimeout(processNext, 0); // yield to browser for smooth progress bar
    }

    processNext();
  });
  </script>
